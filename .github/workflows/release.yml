name: Release

# Triggers as soon as a tag in the format vX.Y.Z is pushed.
on:
  push:
    tags:
      - "v*.*.*"

# Permission to create a release.
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Validate semver tag
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' is not strict semver (vX.Y.Z). Skipping release."
            exit 1
          fi
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Looking for changelog entry for version $VERSION"

          # Extracts the section between "## [VERSION]" and the next "## [" heading
          # (or the trailing block of "[label]: url" reference-link definitions).
          NOTES=$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { capture = 1; next }
            capture && /^## \[/ { exit }
            capture && /^\[.*\]:/ { exit }
            capture { print }
          ' CHANGELOG.md)

          # If no entry was found, use a placeholder.
          if [ -z "$NOTES" ]; then
            NOTES="See CHANGELOG.md for details."
          fi

          # Pass the multi-line output to GitHub Output.
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: false
